name: Publish to Pebble appstore

# Manual trigger only — publishing is outward-facing, so it should be deliberate.
# Requires a repo secret PEBBLE_FIREBASE_REFRESH_TOKEN (see README "Releasing").
on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: 'Changelog / release notes for this version'
        required: true
        default: 'Initial release — local time, heart rate, and up to 5 world-clock cities.'

# Optional: gate this behind a protected environment with required reviewers.
# environment: appstore

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Install Pebble CLI + SDK
        run: |
          uv tool install pebble-tool
          pebble sdk install latest

      - name: Build
        run: pebble build

      - name: Publish
        env:
          # Long-lived credential — the only real secret here.
          REFRESH_TOKEN: ${{ secrets.PEBBLE_FIREBASE_REFRESH_TOKEN }}
          # Public default baked into pebble-tool; not sensitive. Override via a
          # repo variable if your account uses a different Firebase project.
          FIREBASE_API_KEY: ${{ vars.PEBBLE_FIREBASE_API_KEY || 'AIzaSyBZ9Cdvwwv9At2lPmc8TxyyEqSXGXejGvc' }}
          RELEASE_NOTES: ${{ github.event.inputs.release_notes }}
        run: |
          set -euo pipefail
          # Exchange the long-lived refresh token for a fresh ~1h id_token.
          ID_TOKEN=$(curl -sf -X POST \
            "https://securetoken.googleapis.com/v1/token?key=${FIREBASE_API_KEY}" \
            -d "grant_type=refresh_token&refresh_token=${REFRESH_TOKEN}" \
            | jq -r .id_token)
          if [ -z "$ID_TOKEN" ] || [ "$ID_TOKEN" = "null" ]; then
            echo "::error::Failed to mint Firebase id_token (refresh token expired/revoked?)"
            exit 1
          fi
          echo "::add-mask::$ID_TOKEN"
          export PEBBLE_FIREBASE_ID_TOKEN="$ID_TOKEN"
          # Screenshots are NOT uploaded here: the appstore API only ever APPENDS
          # uploaded screenshots (replaceScreenshots is hardcoded false in the CLI
          # with no flag to change it), so every publish would add another copy
          # per device. For an existing app screenshots are optional, so we skip
          # them (--no-gif-all-platforms + no --screenshots) and manage the
          # gallery in the dashboard instead. --description only applies on first
          # app creation; --release-notes is this version's changelog.
          pebble publish --non-interactive \
            --no-gif-all-platforms \
            --description "Shows local time and heart bpm as well as the time in up to 5 other cities" \
            --release-notes "$RELEASE_NOTES" \
            --source "https://github.com/AdamBearWA/PebbleTravelTime"
