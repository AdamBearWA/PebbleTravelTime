name: Build

# Builds the .pbw on every push/PR (sanity check) and, on a version tag,
# attaches the binary to a GitHub Release.
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    # Needed so the release step can create a GitHub Release on tag pushes.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8

      - name: Install Pebble CLI + SDK
        run: |
          uv tool install pebble-tool
          # First build auto-installs the SDK; do it explicitly so failures are clear.
          # NOTE: verify this command against `pebble sdk --help` on first CI run —
          # the exact SDK-install invocation is the most likely line to need a tweak.
          pebble sdk install latest

      - name: Build
        run: pebble build

      - name: Upload .pbw artifact
        uses: actions/upload-artifact@v7
        with:
          name: travel-time-pbw
          # The SDK names the bundle after the project directory, so glob it.
          path: build/*.pbw
          if-no-files-found: error

      - name: Attach .pbw to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: build/*.pbw
